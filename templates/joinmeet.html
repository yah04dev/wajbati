<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Meeting</title>

<script src="https://meet.jit.si/external_api.js"></script>

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#faf8f3;
}

/* SAME HEADER STYLE */
.topbar{
  background:linear-gradient(160deg,#1a4a1e 0%,#2d5a32 60%,#4a8c52 100%);
  padding:20px 48px;
  display:flex; justify-content:space-between; align-items:center;
  color:white;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
}

.top-btn{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  background:rgba(255,255,255,.15);
  color:white;
}

#meet{
  width:100%;
  height:calc(100vh - 80px);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🍏 Wajbati</div>

  <div>
    <button class="top-btn" onclick="window.history.back();'">⬅ Back</button>
    <button class="top-btn" onclick="location.href='/login'">Logout</button>
  </div>
</div>

<div id="meet"></div>

<script>
const domain = "meet.jit.si";

const options = {
    roomName: "{{ room }}",
    parentNode: document.querySelector('#meet'),
    width: "100%",
    height: "100%"
};

const api = new JitsiMeetExternalAPI(domain, options);
</script>

</body>
</html>
