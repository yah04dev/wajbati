<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wajbati - Management Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0f1f3d;
  --navy-mid: #1e3c72;
  --navy-light: #2a5298;
  --blue-glow: #4a7bd4;
  --cream: #faf8f3;
  --gold: #c9a84c;
  --text-mid: #4a5568;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}

/* LEFT PANEL */
.panel-left {
  background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 50px;
  position: relative;
  overflow: hidden;
}

.glow1 {
  position: absolute;
  width: 450px; height: 450px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(74,123,212,0.2), transparent);
  top: -100px; right: -120px;
  animation: glowPulse 7s ease-in-out infinite alternate;
}

.glow2 {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.12), transparent);
  bottom: -60px; left: -60px;
  animation: glowPulse 9s ease-in-out infinite alternate-reverse;
}

@keyframes glowPulse {
  0% { transform: scale(1) translate(0,0); }
  100% { transform: scale(1.3) translate(15px, -15px); }
}

.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.floating-dots {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.dot {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  animation: floatDot linear infinite;
}

@keyframes floatDot {
  0%   { transform: translateY(110%) scale(0.5); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-10%) scale(1); opacity: 0; }
}

.left-content {
  position: relative;
  z-index: 2;
  text-align: center;
  color: white;
}

.portal-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 7px 18px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
  backdrop-filter: blur(6px);
}

.portal-badge::before { content: '⚡'; }

.left-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 36px;
}

.left-logo-icon {
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  border: 1px solid rgba(255,255,255,0.2);
}

.left-logo span {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
}

.left-title {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  line-height: 1.25;
  margin-bottom: 16px;
}

.left-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
  max-width: 340px;
}

.role-cards {
  display: flex;
  gap: 16px;
  margin-top: 40px;
  justify-content: center;
}

.role-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 20px 22px;
  text-align: center;
  backdrop-filter: blur(8px);
  flex: 1;
  max-width: 140px;
}

.role-card-icon {
  font-size: 24px;
  margin-bottom: 8px;
}

.role-card-title {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  margin-bottom: 4px;
}

.role-card-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

/* RIGHT PANEL */
.panel-right {
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 50px;
}

.form-box {
  width: 100%;
  max-width: 400px;
  animation: slideIn 0.7s ease both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}

.form-header {
  margin-bottom: 34px;
}

.form-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  color: var(--navy);
  margin-bottom: 8px;
}

.form-header p {
  font-size: 14px;
  color: var(--text-mid);
}

.input-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

input, select {
  width: 100%;
  padding: 13px 16px;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  background: white;
  color: var(--navy);
  transition: all 0.25s;
  appearance: none;
}

input:focus, select:focus {
  border-color: var(--navy-light);
  outline: none;
  box-shadow: 0 0 0 4px rgba(30,60,114,0.1);
}

input::placeholder { color: #a0aec0; }

.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--navy-mid);
  pointer-events: none;
  font-size: 16px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 6px;
  cursor: pointer;
}

.remember input {
  width: auto;
  width: 16px;
  height: 16px;
  accent-color: var(--navy-mid);
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--navy-light), var(--navy));
  color: white;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
  letter-spacing: 0.3px;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(15,31,61,0.3);
}

.links {
  margin-top: 20px;
  text-align: center;
  font-size: 14px;
}

.links a {
  color: var(--navy-mid);
  text-decoration: none;
  font-weight: 500;
}

.links a:hover { text-decoration: underline; }

.error {
  color: #e53e3e;
  background: #fff5f5;
  border: 1px solid #feb2b2;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 18px;
  text-align: center;
}

@media(max-width: 768px) {
  body { grid-template-columns: 1fr; }
  .panel-left { display: none; }
  .panel-right { padding: 40px 24px; }
}
</style>
</head>

<body>

<div class="panel-left">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="grid-bg"></div>
  <div class="floating-dots" id="dots"></div>

  <div class="left-content">
    <div class="portal-badge">Management Portal</div>

    <div class="left-logo">
      <div class="left-logo-icon">🍏</div>
      <span>Wajbati</span>
    </div>

    <h2 class="left-title">Secure Access<br>for Professionals</h2>
    <p class="left-sub">Manage users, review applications, and oversee the Wajbati platform with full control.</p>

    <div class="role-cards">
      <div class="role-card">
        <div class="role-card-icon">🛡️</div>
        <div class="role-card-title">Admin</div>
        <div class="role-card-desc">Full platform control</div>
      </div>
    </div>
  </div>
</div>

<div class="panel-right">
  <div class="form-box">
    <div class="form-header">
      <h2>Management Login</h2>
      <p>Authorized personnel only</p>
    </div>

    <div class="error">{{err}}</div>

    <form id="loginForm" method="post">

      <div class="input-group">
        <label>Professional Email</label>
        <input type="email" name="email" placeholder="admin@wajbati.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="input-group">
        <label>Login As</label>
        <div class="select-wrap">
          <select name="role" id="role" required>
            <option value="">Select your role</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="remember">
        <input type="checkbox">
        <span>Remember me on this device</span>
      </div>

      <button type="submit" class="btn">Access Portal →</button>

    </form>

    <div class="links">
      <a href="#">Forgot Password?</a>
    </div>
  </div>
</div>

<script>
// Floating dots
const dotsContainer = document.getElementById('dots');
for (let i = 0; i < 14; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  const size = 4 + Math.random() * 14;
  dot.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    bottom:-${size}px;
    animation-duration:${8+Math.random()*12}s;
    animation-delay:${Math.random()*15}s;
  `;
  dotsContainer.appendChild(dot);
}

const form = document.getElementById("loginForm");
const role = document.getElementById("role");

form.addEventListener("submit", function(e) {
  if(role.value === "admin"){
    form.action = "/logincaa";
  }
  else{
    e.preventDefault();
    alert("Please select a role");
  }
});
</script>

</body>
</html>
