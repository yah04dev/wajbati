<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wajbati - Basic User Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #1a4a1e;
            --green-mid: #2d7a35;
            --green-pale: #e8f5e9;
            --cream: #faf8f3;
            --text-dark: #1a1a1a;
            --text-mid: #4a5568;
            --gold: #c9a84c;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            margin: 0;
            display: flex;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--green-deep);
            color: white;
            padding: 30px 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            background: var(--green-mid);
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-item:hover {
            background: #368a41;
        }

        .nav-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-logout:hover {
            background: #c62828; /* Red for logout */
            border-color: transparent;
        }

        /* ─── MAIN CONTENT ─── */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            max-width: 1200px;
        }

        .header { margin-bottom: 30px; }

        .badge-plan {
            background: var(--green-pale);
            color: var(--green-mid);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .dashboard-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .section-sub {
            color: var(--text-mid);
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* ─── AI TRACKER ─── */
        .upload-zone {
            border: 2px dashed var(--green-mid);
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            background: var(--cream);
            transition: 0.3s;
        }

        .upload-zone.disabled {
            background: #f5f5f5;
            border-color: #ccc;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ─── FORMS ─── */
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 5px; }
        
        .custom-input, .custom-select, textarea.custom-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea.custom-input {
            resize: vertical;
        }

        .btn-primary {
            background: var(--green-deep);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover { background: var(--green-mid); }
        .btn-primary.gold { background: var(--gold); }
        .btn-primary.gold:hover { background: #b5953e; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🍏 Wajbati</div>
        
        <a href="/homeba" class="nav-item">
            <span>🏠</span> Dashboard
        </a>

        <a href="/blog" class="nav-item">
            <span>📝</span> Blog
        </a>

        <a href="/" class="nav-item nav-logout">
            <span>🚪</span> Logout
        </a>
    </div>

    <main class="main-content">
        <div class="header">
            <span class="badge-plan">Basic Plan</span>
            <h1 style="margin-top: 10px;">User Dashboard</h1>
            <p style="color: var(--text-mid);">Welcome back! Here is your daily overview.</p>
        </div>

        <div class="dashboard-grid">
            
            <!-- AI TRACKER -->
            <div class="dashboard-card">
                <h3>AI Calorie Detection</h3>
                <p class="section-sub">Daily usage: 1 scan only.</p>
                
                <div id="ai-upload-zone" class="upload-zone">
                    <span style="font-size: 40px; display: block;">📸</span>
                    <p id="tracker-message">Upload meal photo</p>
                    <input type="file" id="ai-input" accept="image/*" style="display:none">
                </div>
                
                <p id="limit-warning" style="display:none; color: #d32f2f; font-size: 13px; margin-top: 15px; text-align: center; font-weight: 500;">
                    ⚠️ Daily limit reached. Scan again tomorrow.
                </p>
            </div>

            <!-- MEETING REQUEST -->
            <div class="dashboard-card">
                <h3>Book a Session</h3>
                <p class="section-sub">Consult with a pro for 500 DZD.</p>
                
                <!-- NEW FORM FORMAT INSERTED HERE -->
                <form action="/book_consultation" method="POST">
                    
                    <!-- Passing the client email from Flask / Session context -->
                    <input type="hidden" name="client_email" value="{{ email }}">

                    <div class="form-group">
                        <label>Select Nutritionist</label>
                        <select name="coach_email" class="custom-select" required>
                            <option value="" disabled selected>Choose a coach...</option>
                            <!-- Dynamically generated list from DB -->
                            {% for coach in coaches %}
                                <option value="{{ coach.email }}">
                                    {{ coach.fullname }} (Availability: {{ coach.availability }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Preferred Date &amp; Time</label>
                        <input type="datetime-local" name="date" class="custom-input" required>
                    </div>

                    <div class="form-group">
                        <label>Notes for your nutritionist</label>
                        <textarea name="notes" rows="3" class="custom-input" placeholder="Any symptoms, questions or goals..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary gold">Confirm Booking →</button>
                </form>

            </div>

        </div>
    </main>

    <script>
        // AI LIMIT LOGIC
        const aiZone = document.getElementById('ai-upload-zone');
        const aiInput = document.getElementById('ai-input');

        function checkLimit() {
            const lastUsed = localStorage.getItem('last_ai_scan');
            if (lastUsed === new Date().toDateString()) {
                aiZone.classList.add('disabled');
                document.getElementById('tracker-message').innerText = "Limit Reached";
                document.getElementById('limit-warning').style.display = "block";
                return true;
            }
            return false;
        }

        aiZone.addEventListener('click', () => {
            if (!checkLimit()) {
                // If limit isn't reached, open the file picker
                aiInput.click();
            } else {
                // If limit IS reached, show the alert
                alert("the day limits exeded");
            }
        });

        aiInput.addEventListener('change', () => {
            alert("Analysis complete: 450 kcal detected!");
            localStorage.setItem('last_ai_scan', new Date().toDateString());
            checkLimit();
        });

        window.onload = checkLimit;
    </script>
</body>
</html>
