<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wajbati - Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --green-deep: #1a4a1e;
  --green-mid: #2d7a35;
  --green-pale: #e8f5e9;
  --cream: #faf8f3;
  --gold: #c9a84c;
  --text-mid: #4a5568;
  --border: #e2e8f0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background: linear-gradient(160deg, var(--green-deep) 0%, #2d5a32 30%, #4a8c52 60%, var(--cream) 100%);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px 60px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Ccircle cx='20' cy='20' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.floating-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.fb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: fbPulse ease-in-out infinite alternate;
}

.fb1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(107,203,119,0.15), transparent);
  top: -80px; right: -80px;
  animation-duration: 7s;
}

.fb2 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(201,168,76,0.1), transparent);
  bottom: 100px; left: -60px;
  animation-duration: 9s;
  animation-delay: -4s;
}

@keyframes fbPulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.3); }
}

.container {
  background: white;
  width: 100%;
  max-width: 560px;
  border-radius: 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.25);
  overflow: hidden;
  position: relative;
  z-index: 1;
  animation: dropIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes dropIn {
  from { opacity: 0; transform: translateY(-30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.form-header {
  background: linear-gradient(135deg, var(--green-deep), #2d5a32);
  padding: 36px 36px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.form-header::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.06), transparent);
  top: -100px; right: -80px;
}

.header-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 16px;
}

.header-logo-icon {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.15);
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 1px solid rgba(255,255,255,0.2);
}

.header-logo span {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: white;
}

.form-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: white;
  margin-bottom: 6px;
  position: relative;
}

.form-header p {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  position: relative;
}

/* STEPS INDICATOR */
.steps {
  display: flex;
  justify-content: center;
  gap: 0;
  padding: 28px 36px 0;
  position: relative;
}

.steps::before {
  content: '';
  position: absolute;
  top: 42px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 120px);
  height: 2px;
  background: var(--border);
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
  position: relative;
  z-index: 1;
}

.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: #a0aec0;
  transition: all 0.3s;
}

.step.active .step-dot {
  background: var(--green-mid);
  border-color: var(--green-mid);
  color: white;
  box-shadow: 0 0 0 4px rgba(45,122,53,0.15);
}

.step.done .step-dot {
  background: var(--green-pale);
  border-color: var(--green-mid);
  color: var(--green-mid);
}

.step-label {
  font-size: 11px;
  font-weight: 500;
  color: #a0aec0;
}

.step.active .step-label { color: var(--green-mid); }

/* FORM BODY */
.form-body {
  padding: 28px 36px 36px;
}

.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0 18px;
}

.section-divider span {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--green-mid);
  white-space: nowrap;
}

.section-divider::before, .section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--green-pale);
}

.input-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--green-deep);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 7px;
}

input, textarea, select {
  width: 100%;
  padding: 12px 15px;
  border-radius: 11px;
  border: 1.5px solid var(--border);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  background: #fafafa;
  color: var(--green-deep);
  transition: all 0.25s;
  appearance: none;
}

input:focus, textarea:focus, select:focus {
  border-color: var(--green-mid);
  outline: none;
  box-shadow: 0 0 0 3px rgba(45,122,53,0.1);
  background: white;
}

input::placeholder, textarea::placeholder { color: #b0bec5; }

textarea { resize: vertical; min-height: 80px; }

.input-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--green-mid);
  pointer-events: none;
}

.file-input-wrap {
  position: relative;
}

.file-input-wrap input[type="file"] {
  padding: 10px 15px;
  cursor: pointer;
}

.file-input-wrap input[type="file"]::file-selector-button {
  background: var(--green-pale);
  border: none;
  border-radius: 7px;
  padding: 5px 12px;
  color: var(--green-deep);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-right: 10px;
  transition: 0.2s;
}

.file-input-wrap input[type="file"]::file-selector-button:hover {
  background: #c8e6c9;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
  color: white;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 10px;
  letter-spacing: 0.3px;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(26,74,30,0.3);
}

.login-link {
  text-align: center;
  margin-top: 18px;
  font-size: 14px;
  color: var(--text-mid);
}

.login-link a {
  color: var(--green-mid);
  text-decoration: none;
  font-weight: 500;
}

.login-link a:hover { text-decoration: underline; }

@media(max-width: 560px) {
  .form-body { padding: 24px 20px 32px; }
  .form-header { padding: 28px 20px 24px; }
  .input-row { grid-template-columns: 1fr; }
  .steps { padding: 22px 20px 0; }
}
</style>
</head>

<body>

<div class="floating-bg">
  <div class="fb fb1"></div>
  <div class="fb fb2"></div>
</div>

<div class="container">

  <div class="form-header">
    <div class="header-logo">
      <div class="header-logo-icon">🍏</div>
      <span>Wajbati</span>
    </div>
    <h2>Create Your Account</h2>
    <p>Join thousands achieving their health goals</p>
  </div>

  <div class="steps">
    <div class="step active">
      <div class="step-dot">1</div>
      <div class="step-label">Profile</div>
    </div>
    <div class="step active">
      <div class="step-dot">2</div>
      <div class="step-label">Health</div>
    </div>
    <div class="step active">
      <div class="step-dot">3</div>
      <div class="step-label">Goals</div>
    </div>
  </div>

  <div class="form-body">
    <form id="signupForm" method="POST" action="/inscb" enctype="multipart/form-data">

      <div class="section-divider"><span>Personal Info</span></div>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" name="fullname" placeholder="Your full name" required>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Age</label>
          <input type="number" id="age" name="age" placeholder="25" required>
        </div>
        <div class="input-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="+213 xxx xxx" required>
        </div>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required>
      </div>

      <div class="section-divider"><span>Body Metrics</span></div>

      <div class="input-row">
        <div class="input-group">
          <label>Weight (kg)</label>
          <input type="number" id="weight" name="weight" placeholder="70" required>
        </div>
        <div class="input-group">
          <label>Height (cm)</label>
          <input type="number" id="height" name="height" placeholder="175" required>
        </div>
      </div>

      <div class="input-group">
        <label>Diseases <span style="font-size:11px;text-transform:none;font-weight:400;color:#a0aec0;">(comma-separated)</span></label>
        <textarea id="diseases" name="dss" placeholder="Diabetes, Hypertension, ..."></textarea>
      </div>

      <div class="input-group">
        <label>Allergies</label>
        <textarea id="alr" name="alergies" placeholder="Peanuts, Gluten, ..."></textarea>
      </div>

      <div class="section-divider"><span>Goals & Plan</span></div>

      <div class="input-group">
        <label>Your Goals</label>
        <textarea id="goals" name="goals" placeholder="e.g. Lose 10kg in 3 months" required></textarea>
      </div>

      <div class="input-group">
        <label>Monthly Salary (DZD)</label>
        <input type="number" name="salary" placeholder="50000" required>
      </div>

      <div class="input-group">
        <label>Profile Photo</label>
        <div class="file-input-wrap">
          <input type="file" name="photo" required>
        </div>
      </div>

      <!-- FIX: Removed the <a> tag and changed type="button" to type="submit" -->
      <button type="submit" class="btn">Create My Account →</button>

    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

</div>

</body>
</html>
